{% extends "base/base.html" %}
{% block title %}تسجيل الحضور{% endblock %}
{% block page_title %}تسجيل حضور الصف{% endblock %}

{% block content %}
<div class="opal-card">

<form method="get" class="mb-4">
<label>اختر الصف</label>
<select name="grade" class="form-control" onchange="this.form.submit()">
<option value="">-- اختر الصف --</option>
{% for grade in grades %}
<option value="{{ grade.id }}" {% if selected_grade == grade.id|stringformat:"s" %}selected{% endif %}>{{ grade.name }}</option>
{% endfor %}
</select>
</form>

{% if students %}
<form method="post">
{% csrf_token %}
<input type="hidden" name="date" value="{{ date }}">

<table class="table table-striped">
<thead>
<tr>
<th>الطالب</th>
<th>الحالة</th>
<th>ملاحظات</th>
</tr>
</thead>
<tbody>
{% for student in students %}
<tr>
<td>{{ student.full_name }}</td>
<td>
<select name="status_{{ student.id }}" class="form-control">
<option value="present">حاضر</option>
<option value="absent">غائب</option>
<option value="late">متأخر</option>
<option value="excused">بعذر</option>
</select>
</td>
<td><input name="notes_{{ student.id }}" class="form-control"></td>
</tr>
{% endfor %}
</tbody>
</table>

<button class="btn btn-success">حفظ الحضور</button>
</form>
{% endif %}

</div>
{% endblock %}
