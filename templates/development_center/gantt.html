{% block content %}

<link rel="stylesheet" href="https://unpkg.com/frappe-gantt/dist/frappe-gantt.css">

<div class="opal-card p-4 mb-4">
  <h3>📅 Gantt Pro</h3>
  <p class="text-muted">عرض تفاعلي للمهام والاعتماديات الزمنية.</p>
</div>

<div class="opal-card p-4">
  <div id="gantt"></div>
</div>

<script src="https://unpkg.com/frappe-gantt/dist/frappe-gantt.umd.js"></script>

<script>
fetch("/development/gantt/data/")
  .then(response => response.json())
  .then(data => {
    const tasks = data.tasks
      .filter(t => t.start_date && t.due_date)
      .map(t => ({
        id: String(t.id),
        name: t.title,
        start: t.start_date,
        end: t.due_date,
        progress: t.progress || 0,
        dependencies: (t.dependencies || []).map(String).join(","),
        custom_class: t.status
      }));

    if (!tasks.length) {
      document.getElementById("gantt").innerHTML =
        "<p class='text-muted'>لا توجد مهام لها تاريخ بداية ونهاية.</p>";
      return;
    }

    function csrfToken(){
      const row = document.cookie.split('; ').find(row => row.startsWith('csrftoken='));
      return row ? row.split('=')[1] : '';
    }

    new Gantt("#gantt", tasks, {
      view_mode: "Day",
      language: "ar",
      on_date_change: function(task, start, end) {
        fetch(`/development/gantt/${task.id}/dates/`, {
          method: "POST",
          headers: {
            "X-CSRFToken": csrfToken(),
            "Content-Type": "application/x-www-form-urlencoded"
          },
          body: `start_date=${start.toISOString().slice(0,10)}&due_date=${end.toISOString().slice(0,10)}`
        }).then(async r => {
          if (!r.ok) {
            let data = {};
            try { data = await r.json(); } catch(e) {}
            alert(data.message || "لم يتم حفظ تعديل Gantt");
            location.reload();
          }
        });
      }
    });
  });
</script>
