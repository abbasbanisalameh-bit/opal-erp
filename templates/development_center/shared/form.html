{% extends "base/base.html" %}
{% block content %}
<h1>{{ title }}</h1>
<div style="background:white;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.08);">
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary" type="submit">حفظ</button>
  <a class="btn btn-secondary" href="javascript:history.back()">رجوع</a>
</form>
</div>
{% endblock %}
