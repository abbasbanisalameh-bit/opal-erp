<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}لوحة التحكم{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/opal_dashboard.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">◆</div>
            <div>
                <h2>OPAL</h2>
                <span>School System</span>
            </div>
        </div>

        <nav>
            <a href="/" class="active">الرئيسية</a>
            <a href="/students/">الطلاب</a>
            <a href="#">المعلمون</a>
            <a href="#">الحضور</a>
            <a href="#">الدرجات</a>
            <a href="#">الرسوم المالية</a>
            <a href="#">التقارير</a>
            <a href="#">الإعدادات</a>
        </nav>

        <div class="logout">تسجيل الخروج</div>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h1>{% block page_title %}لوحة التحكم{% endblock %}</h1>
                <p>نظام إدارة مدرسة أوبال الدولية</p>
            </div>

            <div class="user-box">
                <span>مرحبًا بك</span>
                <div class="avatar">O</div>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
