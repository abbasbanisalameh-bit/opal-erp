{% extends "base/base.html" %}
{% block content %}
<div class="page-header">
  <h1>الصفوف الدراسية</h1>
  <a href="{% url 'academics:grade_create' %}" class="btn btn-primary">إضافة صف</a>
</div>

<table class="table">
  <thead>
    <tr>
      <th>الاسم</th>
      <th>الترتيب</th>
      <th>فعال</th>
      <th>إجراءات</th>
    </tr>
  </thead>
  <tbody>
    {% for grade in grades %}
    <tr>
      <td>{{ grade.name }}</td>
      <td>{{ grade.order }}</td>
      <td>{{ grade.is_active|yesno:"نعم,لا" }}</td>
      <td>
        <a href="{% url 'academics:grade_update' grade.id %}">تعديل</a>
        |
        <a href="{% url 'academics:grade_delete' grade.id %}" onclick="return confirm('هل أنت متأكد؟')">حذف</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="4">لا توجد صفوف بعد</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
